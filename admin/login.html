<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | SarkariAlert.in</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border-radius:10px;padding:36px 32px;width:340px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.login-logo{font-size:22px;font-weight:900;color:#1a1a2e;margin-bottom:4px;font-family:Georgia,serif}
.login-logo span{color:#d63600}
.login-sub{font-size:12px;color:#888;margin-bottom:24px}
.login-label{display:block;text-align:left;font-size:12px;font-weight:700;color:#555;margin-bottom:5px}
.login-input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:5px;font-size:14px;outline:none;margin-bottom:16px;font-family:Arial,sans-serif}
.login-input:focus{border-color:#d63600}
.login-btn{width:100%;background:#d63600;color:#fff;border:none;padding:12px;border-radius:5px;font-size:15px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif}
.login-btn:hover{background:#b52d00}
.login-err{color:#d63600;font-size:13px;margin-top:10px;display:none}
.login-back{margin-top:14px;font-size:12px;color:#888}
.login-back a{color:#d63600}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">SarkariAlert<span>.in</span></div>
  <div class="login-sub">Admin Panel Login</div>
  <label class="login-label">Password</label>
  <input type="password" class="login-input" id="pwd" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="login-btn" onclick="doLogin()">Login to Admin Panel</button>
  <div class="login-err" id="err">Wrong password. Please try again.</div>
  <div class="login-back"><a href="../index.html">Back to Website</a></div>
</div>
<script>
var PASS = "sarkari@admin2026";
function doLogin(){
  var p = document.getElementById('pwd').value;
  if(p === PASS){
    sessionStorage.setItem('sa_admin','true');
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}
</script>
</body></html>
